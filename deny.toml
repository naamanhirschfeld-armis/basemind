[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
  # number_prefix — unmaintained, transitive via lance; no replacement available.
  "RUSTSEC-2025-0119",
  # paste — unmaintained, widely-used proc-macro; still functional, no migration path.
  "RUSTSEC-2024-0436",
  # rustls-pemfile — unmaintained, transitive via the rustls/reqwest stack; functional,
  # folded into rustls upstream, no migration needed here.
  "RUSTSEC-2025-0134",
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CDLA-Permissive-2.0",
  "Zlib",
  "Unlicense",
  "CC0-1.0",
  "Unicode-3.0",
  "BSL-1.0",
  "0BSD",
  # finl_unicode (transitive) ships under Unicode-DFS-2016 — the same Unicode
  # Consortium license family as Unicode-3.0 (already allowed).
  "Unicode-DFS-2016",
]
confidence-threshold = 0.8

# zstd-sys / zstd-safe still ship `license = "MIT/Apache-2.0"` (deprecated slash
# form). The licenses are individually allowed above — clarify the expression
# so cargo-deny parses them as an SPDX OR.
[[licenses.clarify]]
name = "zstd-sys"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "zstd-safe"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "zstd"
expression = "MIT OR Apache-2.0"
license-files = []

# option-ext (transitive via dirs → tree-sitter-language-pack) is MPL-2.0.
# Accept the file-level copyleft scope for this single dependency.
[[licenses.exceptions]]
name = "option-ext"
allow = ["MPL-2.0"]

# uluru (transitive via gix-pack → gix) is an LRU cache crate, MPL-2.0. Accept
# the same file-level copyleft scope as option-ext.
[[licenses.exceptions]]
name = "uluru"
allow = ["MPL-2.0"]

# kreuzberg is Elastic-2.0 — basemind ships it as the document-tier engine
# (RAG / OCR / NER stack). Source license is intentionally chosen by basemind.
[[licenses.exceptions]]
name = "kreuzberg"
allow = ["Elastic-2.0"]

# kreuzcrawl is Elastic-2.0 — sibling project to kreuzberg, used as the web
# crawl tier (gated by the `crawl` feature).
[[licenses.exceptions]]
name = "kreuzcrawl"
allow = ["Elastic-2.0"]

# libbz2-rs-sys (transitive via the document tier's archive support) ships
# under the bespoke bzip2-1.0.6 license — equivalent to BSD-style permissive.
[[licenses.exceptions]]
name = "libbz2-rs-sys"
allow = ["bzip2-1.0.6"]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
