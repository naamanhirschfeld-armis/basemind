[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    "RUSTSEC-2025-0119",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0192",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CDLA-Permissive-2.0",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "Unicode-3.0",
    "BSL-1.0",
    "0BSD",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "zstd-sys"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "zstd-safe"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "zstd"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.exceptions]]
name = "option-ext"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "uluru"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
name = "libbz2-rs-sys"
allow = ["bzip2-1.0.6"]

[[licenses.exceptions]]
name = "inferno"
allow = ["CDDL-1.0"]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
