# rumdl — Rust-based markdown linter
# https://github.com/rvben/rumdl

respect-gitignore = true
exclude = [
  "node_modules",
  "target",
  "dist",
  "vendor",
]

# MD013: Line length — prose in .ai-rulez/ rules / context can be long.
# MD024: Allow repeated headings (CHANGELOG-style sections).
# MD033: Inline HTML.
# MD036: Bold labels are used as pseudo-headings inside <details> blocks
#        (e.g. the README CLI reference); don't promote them to real headings.
# MD041: Don't require first line to be an H1.
disable = [
  "MD013",
  "MD024",
  "MD033",
  "MD036",
  "MD041",
]
