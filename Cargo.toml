[package]
name = "basemind"
version = "0.5.0"
authors = ["Na'aman Hirschfeld <nhirschfeld@gmail.com>"]
edition = "2024"
description = "Full AI context layer over MCP — tree-sitter code-map, document RAG (PDF/Office/HTML/email + OCR + reranker), shared agent memory, on-demand web crawl, git history + blame + per-symbol diff. 300+ languages, 8 coding-agent harnesses, content-addressed Fjall + LanceDB."
readme = "README.md"
license = "MIT"
repository = "https://github.com/Goldziher/basemind"
documentation = "https://docs.rs/basemind"
homepage = "https://github.com/Goldziher/basemind"
keywords = ["mcp", "agent-context", "rag", "code-map", "tree-sitter"]
categories = ["command-line-utilities", "development-tools"]

[package.metadata.cargo-machete]
# serde_toon_format exposes the lib crate as `serde_toon`; machete sees the
# package name and can't resolve the rename, so it flags it as unused.
# The crate IS used — `serde_toon::to_string(...)` in src/mcp/helpers.rs.
ignored = ["serde_toon_format"]

[lib]
name = "basemind"
path = "src/lib.rs"

[[bin]]
name = "basemind"
path = "src/main.rs"

[features]
# Document intelligence + vector storage + shared agent memory.
# Off by default so a vanilla `cargo install basemind` stays MIT-only, builds
# fast, and doesn't pull in ONNX Runtime. Opt in with --features documents,memory
# (or just one of them).
default = []

# Base infrastructure: kreuzberg (Elastic-2.0) + LanceDB + Arrow. Pulled in by
# both `documents` and `memory`; doesn't activate any extraction backends by
# itself.
intelligence = [
    "dep:kreuzberg",
    "dep:lancedb",
    "dep:arrow-array",
    "dep:arrow-schema",
    "dep:futures",
]

# Document tier: ingest PDFs, Office docs, emails, HTML, etc. via kreuzberg,
# plus the full RAG-supporting analysis stack (chunking, keywords, NER, layout,
# OCR, summarization, redaction). `embeddings` already implies `chunking` and
# bundles ORT binaries (ort-bundled) so no system onnxruntime install is
# required. `summarization-llm` IS bundled, but it stays dormant unless an
# `[llm]` config block (model + api_key) is supplied — with no key it is a no-op,
# so it imposes no runtime config burden on the default user. The remaining
# LLM-driven features (liter-llm, ner-llm, translation, classification,
# captioning, redaction-ml) are intentionally excluded — they require an external
# API key to do anything useful.
documents = [
    "intelligence",
    "kreuzberg/formats",
    # pdf, excel, office, hwp, hwpx, iwork, email, html, xml, archives, mdx
    "kreuzberg/analysis",
    # language-detection, chunking, quality, keywords, diff
    "kreuzberg/chunking-tokenizers",
    # token-aware chunk boundaries
    "kreuzberg/embeddings",
    # ORT-bundled embedding generation
    "kreuzberg/reranker",
    # cross-encoder reranking (ORT-bundled, off by default in config)
    "kreuzberg/reranker-presets",
    # preset catalog (bge-reranker-base, jina-reranker-v1-turbo-en, …)
    "kreuzberg/ocr",
    # Tesseract OCR
    "kreuzberg/paddle-ocr",
    # PaddleOCR (multilingual)
    "kreuzberg/layout-detection",
    # YOLO/RT-DETR page layout
    "kreuzberg/auto-rotate",
    # page orientation correction
    "kreuzberg/ner-onnx",
    # local NER (gline-rs)
    "kreuzberg/keywords-yake",
    # YAKE keyword algorithm + YakeParams tuning
    "kreuzberg/keywords-rake",
    # RAKE keyword algorithm + RakeParams tuning
    "kreuzberg/summarization",
    # TextRank extractive (no LLM)
    "kreuzberg/summarization-llm",
    # liter-llm abstractive summarisation (gated on `[llm]` config)
    "kreuzberg/redaction",
    # pattern-based PII (no LLM)
    # QR decode from images
    "kreuzberg/qr-codes",
    "dep:serde_toon_format",
]

# Shared agent memory: needs the embedding engine + LanceDB, plus the bits of
# RAG infrastructure that make memory search useful (keywords for hybrid rank,
# NER for entity-anchored retrieval). No document parsing backends.
memory = [
    "intelligence",
    "kreuzberg/embeddings",
    "kreuzberg/keywords",
    "kreuzberg/ner-onnx",
]

# On-demand web crawling. Pulls kreuzcrawl as an HTTP-only crawler (no chromium,
# no LLM extraction) and routes scrape/crawl results through the documents
# pipeline (chunk → embed → LanceDB). Implies `documents` because the doc tier
# IS the indexing sink for crawled pages.
crawl = ["documents", "dep:kreuzcrawl", "dep:url"]

# Agent-to-agent communication: the singleton broker daemon, named rooms + per-agent
# inbox, and the comms MCP/CLI surface. Pulls only small pure-Rust crates (directories,
# tokio-util). Message/agent-card shapes are modelled as plain serde structs that are
# field-compatible with the A2A spec (the published `a2a-types` crate is protobuf-based and
# doesn't round-trip through msgpack), so a future A2A HTTP front-end maps cleanly. The
# `AgentId`/`RoomId` newtypes in `comms::ids` are always compiled (the split-memory tier
# needs them); this feature gates the daemon + tools.
comms = ["dep:directories", "dep:tokio-util"]

# Agent-to-agent gRPC surface (A2A protocol). Phase B0a: brings in the generated
# `lf.a2a.v1` tonic service + prost message types (committed under
# src/a2a/generated/). Pulls only the gRPC runtime crates; not yet wired into the
# server. tonic 0.12 / prost 0.13 are pinned to match the buf remote plugins
# (neoeinstein-tonic v0.4.1 / neoeinstein-prost v0.4.0) that generated the code.
a2a = [
    "dep:tonic",
    "dep:prost",
    "dep:prost-types",
    "dep:uuid",
    "dep:chrono",
    "dep:base64",
    "dep:tokio-util",
    "dep:tokio-stream",
    "dep:axum",
    "dep:tower",
    "dep:tower-http",
    "dep:subtle",
]

# Convenience meta-feature: everything basemind exposes today. Equivalent to
# `--features documents,memory,crawl,comms`. Use this when you want one flag that
# always pulls in the full intelligence surface as we add tiers in the future.
full = ["documents", "memory", "crawl", "comms", "a2a"]

[dependencies]
ahash = "0.8"
anstream = "1.0"
anstyle = "1"
anyhow = "1"
arc-swap = "1.9.1"
# Pinned to arrow 58 to match the version lancedb 0.30 resolves transitively
# (lancedb → lance → datafusion → arrow 58). Depending on a newer arrow here
# produces a dual-version skew where our `src/lance` RecordBatch/Schema types
# don't match lancedb's API. Bump in lock-step with lancedb's arrow major.
arrow-array = { version = "58", optional = true }
arrow-schema = { version = "58", optional = true }
# A2A JSON-RPC 2.0 / agent-card / SSE HTTP binding (a2a feature only). axum 0.7
# matches the http 1 / hyper 1 / tower-service 0.3 generation tonic 0.12 resolves,
# so the gRPC service mounts into the same app with no version skew.
axum = { version = "0.7", optional = true }
# Base64 codec for A2A `Part::Bytes` JSON round-tripping (a2a feature only).
base64 = { version = "0.22", optional = true }
blake3 = "1"
bstr = { version = "1", features = ["serde"] }
# Timestamps for A2A domain types (a2a feature only).
chrono = { version = "0.4", features = ["serde"], optional = true }
clap = { version = "4", features = ["derive", "env"] }
# User-global data/runtime dirs for the comms daemon's socket + store (XDG / Known Folders).
directories = { version = "6", optional = true }
fjall = "3.1.5"
fs2 = "0.4"
futures = { version = "0.3", optional = true }
gix = { version = "0.84.0", features = ["status", "blob-diff", "revision", "max-performance-safe"] }
globset = "0.4"
hex = "0.4"
ignore = "0.4"
jsonschema = "0.46"
kreuzberg = { version = "=5.0.0-rc.18", default-features = false, features = ["tokio-runtime", "simd-utf8"], optional = true }
# kreuzcrawl powers the on-demand web crawl tier. Pinned to the active rc the
# same way kreuzberg is. Default features cover native-runtime (HTTP + tokio);
# we deliberately do NOT opt into `browser`, `ai`, `api`, `mcp`, or `warc`.
kreuzcrawl = { version = "=0.3.0-rc.55", default-features = false, features = ["native-runtime"], optional = true }
lancedb = { version = "0.30", optional = true }
lru = "0.18.0"
memchr = "2"
notify = "8"
notify-debouncer-full = "0.7"
# A2A gRPC runtime. prost 0.13 / tonic 0.12 match the buf remote plugins
# (neoeinstein-prost v0.4.0 / neoeinstein-tonic v0.4.1) used to generate
# src/a2a/generated/. Bump these in lock-step with the plugin pins in buf.gen.yaml.
prost = { version = "0.13", optional = true }
prost-types = { version = "0.13", optional = true }
rayon = "1"
regex = "1.12.4"
rmcp = { version = "1.7", features = ["server", "macros", "schemars", "transport-io"] }
rmp-serde = "1"
# Drives the schema-first config: every config struct in src/config/v1.rs derives
# JsonSchema so the committed JSON schema can be regenerated from the Rust types.
# Pinned to 1.2 to match the transitive version rmcp already pulls in.
schemars = "1.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_toon_format = { version = "0.1", optional = true }
streaming-iterator = "0.1"
# Audited constant-time byte comparison for the A2A bearer-token check.
subtle = { version = "2", optional = true }
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal", "sync", "io-util", "io-std", "time", "net", "fs", "process"] }
# `ReceiverStream` adapter for the A2A gRPC streaming RPCs (a2a feature only).
tokio-stream = { version = "0.1", optional = true }
# Length-delimited framing for the comms daemon IPC (Unix socket / named pipe).
tokio-util = { version = "0.7", features = ["codec"], optional = true }
toml = "1.1"
# A2A gRPC service + transport. tonic 0.12 matches neoeinstein-tonic v0.4.1.
tonic = { version = "0.12", optional = true }
# Shared tower middleware stack for the A2A HTTP server (ServiceBuilder +
# concurrency-limit / load-shed / timeout). a2a feature only.
tower = { version = "0.5", features = ["util", "limit", "load-shed", "timeout"], optional = true }
# HTTP middleware layers (trace, cors, request-id, body-limit) for the A2A
# axum server. a2a feature only.
tower-http = { version = "0.6", features = ["trace", "cors", "request-id", "limit"], optional = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tree-sitter = "0.26"
tree-sitter-language-pack = "=1.9.0-rc.45"
url = { version = "2", features = ["serde"], optional = true }
# UUID-backed identity newtypes for A2A domain types (a2a feature only).
uuid = { version = "1", features = ["v4", "serde"], optional = true }

[dev-dependencies]
insta = "1"
proptest = "1"
# Client-side rmcp used by the `harden` integration test to drive `basemind serve`
# over a stdio child-process transport. Composes with the [dependencies] entry
# above — features are union-merged by cargo.
rmcp = { version = "1.7", features = ["client", "transport-child-process"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
# wiremock spins up an in-process HTTP server for the `crawl` smoke test so we
# never hit the live network. Pulled in only at test time.
wiremock = "0.6"

[profile.release]
lto = "thin"
codegen-units = 1
