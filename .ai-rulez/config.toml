version = "4.0"
name = "basemind"
description = "Code-map MCP server + scanner — pure-Rust, content-addressed, Fjall-backed inverted index."
gitignore = true

presets = [
  "claude",
  "cursor",
  "gemini",
  "windsurf",
  "copilot",
  "continue-dev",
  "amp",
  "cline",
  "codex",
  "opencode",
  "junie",
  "antigravity",
]

builtins = [
  "rust",
  "cicd",
  "documentation",
  "observability",
  "default-commands",
]

# basemind itself is delivered via the [[plugins]] marketplace entry below (the launcher
# downloads the published binary), so it is intentionally NOT declared as a project-level
# mcp_server — that would duplicate the plugin in Claude Code and pin a local binary path.

[[mcp_servers]]
name = "ai-rulez"
description = "Manage AI governance config via MCP."
command = "npx"
args = ["-y", "ai-rulez@latest", "mcp"]

[[marketplaces]]
name = "basemind"
source = "Goldziher/basemind"
type = "github"

[[plugins]]
marketplace = "basemind"
name = "basemind"
scope = "project"
enabled = true
